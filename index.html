<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Snake</title>
    <link rel="stylesheet" href="./styles.css?v=20260413-3">
  </head>
  <body>
    <main>
      <section class="game-shell" aria-labelledby="game-title">
        <div class="top-bar">
          <h1 id="game-title">Snake</h1>
          <div class="score-panel" aria-live="polite">
            <span class="score-label">Score</span>
            <span class="score-value" data-score>0</span>
          </div>
        </div>

        <div class="board" data-board tabindex="0" aria-label="Snake board"></div>

        <div class="controls">
          <div class="action-buttons">
            <button class="button" type="button" data-pause>Pause</button>
            <button class="button" type="button" data-restart>Restart</button>
          </div>
          <div class="direction-pad" aria-label="Direction controls">
            <button class="direction-button" type="button" data-direction="up" aria-label="Move up">Up</button>
            <button class="direction-button" type="button" data-direction="left" aria-label="Move left">Left</button>
            <button class="direction-button" type="button" data-direction="down" aria-label="Move down">Down</button>
            <button class="direction-button" type="button" data-direction="right" aria-label="Move right">Right</button>
          </div>
        </div>

        <div class="game-notes">
          <p class="instructions" data-status>Press an arrow key or WASD to start.</p>
          <p class="direction-instructions">Move with Arrow Keys or WASD. Press Space to pause.</p>
        </div>
      </section>
    </main>

    <script type="module" src="./src/main.mjs"></script>
  </body>
</html>
